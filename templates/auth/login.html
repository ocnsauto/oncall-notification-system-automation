<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Nebulynx Oncall System</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}" />
</head>
<body class="login-body">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-mark">◈</span>
      <h1 class="login-title">ONCALL SYSTEM</h1>
      <p class="login-sub">Nebulynx — Admin Access</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash--{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
      <div class="form-group">
        <label for="username" class="form-label">Username</label>
        <input id="username" name="username" type="text" class="form-input" autocomplete="username" required />
      </div>
      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input id="password" name="password" type="password" class="form-input" autocomplete="current-password" required />
      </div>
      <button type="submit" id="login-btn" class="btn btn--primary btn--full">Login</button>
    </form>
  </div>
</body>
</html>
